services:
  illini_popcorn:
    build: .
    image: illini_popcorn:latest
    environment:
      # Optional: set in your shell or .env file
      OPENET_API_KEY: ${OPENET_API_KEY:-}
    volumes:
      # Persist outputs generated by runs
      - ./outputs:/app/outputs
      # Allow editing data locally without rebuilding image
      - ./data:/app/data
    command: ["python", "scripts/irrigation_model.py"]
